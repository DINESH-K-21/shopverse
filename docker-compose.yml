version: "3.9"

services:
  auth-service:
    build: ./auth-backend
    container_name: auth-service
    ports:
      - "3001:3000"   # localhost:3001 -> container:3000
    networks:
      - app-network

  product-service:
    build: ./product-backend
    container_name: product-service
    ports:
      - "4001:4000"   # localhost:4001 -> container:4000
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "70"          # only accessible inside Docker network
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "5000:80"     # localhost:5000 -> nginx:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - auth-service
      - product-service
    networks:
      - app-network

networks:
  app-network:
    driver: bridge