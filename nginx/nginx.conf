server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/auth/ {
        proxy_pass http://auth-service:3000;
    }

    location /api/products/ {
        proxy_pass http://product-service:4000;
    }
}